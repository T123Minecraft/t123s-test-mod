name: Bug Report
description: File a bug report to help us improve the mod
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: mc-version
    attributes:
      label: Minecraft Version
      description: Which Minecraft version are you using?
      options:
        - 1.20.1
        - 1.21.1
        - 1.21.4
        - Other (please specify in the description)
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      description: The exact mod version you are running
      placeholder: "e.g. v2.0.1"
    validations:
      required: true

  - type: dropdown
    id: loader
    attributes:
      label: Mod Loader
      description: Which mod loader are you using?
      options:
        - Forge
        - Fabric
        - NeoForge
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide clear steps to reproduce the issue
      placeholder: |
        1. Launch the game with the mod
        2. Perform action X
        3. Observe crash / unexpected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Files
      description: Please paste the content of `logs/latest.log` or `logs/debug.log` here. This is crucial.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (screenshots, mod list, etc.)
